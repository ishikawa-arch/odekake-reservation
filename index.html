<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オデカケ予約 | ODEKAKE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #f8f9fa;
    --ink: #1a1a1a;
    --ink-soft: #4b5563;
    --ink-mute: #9ca3af;
    --line: #e5e7eb;
    --line-soft: #f1f3f5;
    --accent: #1e88c8;
    --accent-deep: #156ba5;
    --accent-soft: #e8f3fa;
    --gathering: #2d8a5f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Sans JP", "Hiragino Sans", "Meiryo", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.75;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
    padding: 8px 20px 60px;
  }

  /* ==== セクション見出し ==== */
  .section-head {
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .section-head h2 {
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.02em;
  }

  .section-head .lead {
    color: var(--ink-soft);
    font-size: 14px;
  }

  /* ==== 月切替（倶楽部） ==== */
  .month-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
  }

  .month-pill {
    background: white;
    border: 1px solid var(--line);
    padding: 8px 18px;
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s ease;
  }

  .month-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .month-pill.active {
    background: var(--ink);
    color: white;
    border-color: var(--ink);
  }

  /* ==== カードグリッド ==== */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
  }

  .card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 10px 24px -10px rgba(30, 136, 200, 0.18);
  }

  .card-image {
    aspect-ratio: 16 / 10;
    background: var(--line-soft);
    background-size: cover;
    background-position: center;
    position: relative;
  }

  .card-date {
    position: absolute;
    top: 12px; left: 12px;
    background: white;
    padding: 6px 12px;
    text-align: center;
    border-left: 3px solid var(--accent);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-radius: 2px;
  }

  .card-date .month {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--accent);
    font-weight: 700;
  }

  .card-date .day {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    color: var(--ink);
  }

  .card-tag {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--ink);
    color: white;
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 0.08em;
    font-weight: 500;
    border-radius: 2px;
  }

  .card-tag.gathered { background: var(--gathering); }

  .card-body {
    padding: 18px 18px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .card-meta {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 14px;
    font-size: 13px;
    color: var(--ink-soft);
  }

  .card-meta-row {
    display: flex;
    gap: 10px;
    align-items: baseline;
  }

  .card-meta-label {
    color: var(--ink-mute);
    font-size: 11px;
    min-width: 52px;
    font-weight: 500;
  }

  .card-desc {
    color: var(--ink-soft);
    font-size: 13px;
    margin-bottom: 16px;
    flex: 1;
  }

  /* ==== 進捗バー ==== */
  .progress { margin-bottom: 14px; }

  .progress-stat {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  .progress-stat strong {
    font-size: 14px;
    color: var(--gathering);
    font-weight: 700;
  }

  .progress-bar {
    height: 5px;
    background: var(--line);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--gathering);
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .progress-state {
    font-size: 11px;
    margin-top: 6px;
    color: var(--ink-mute);
  }

  .progress-state.met {
    color: var(--accent);
    font-weight: 700;
  }

  /* ==== 申込ボタン ==== */
  .btn-apply {
    background: var(--accent);
    color: white;
    border: none;
    padding: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s ease;
    text-align: center;
    text-decoration: none;
    display: block;
    border-radius: 3px;
  }

  .btn-apply:hover { background: var(--accent-deep); }

  /* ==== オーダーメイドCTA ==== */
  .order-cta {
    background: var(--accent-soft);
    border: 1px solid #c8e1f2;
    border-radius: 4px;
    padding: 40px 28px;
    text-align: center;
  }

  .order-cta h3 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--ink);
  }

  .order-cta p {
    color: var(--ink-soft);
    margin-bottom: 28px;
    font-size: 14px;
    line-height: 1.9;
  }

  .cta-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary, .btn-secondary {
    display: inline-block;
    padding: 13px 28px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    border-radius: 3px;
    transition: all 0.2s ease;
    min-width: 160px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: var(--accent-deep);
  }

  .btn-secondary {
    background: white;
    color: var(--ink);
    border: 1px solid var(--line);
  }

  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ==== empty / loading ==== */
  .empty, .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-mute);
    font-size: 14px;
  }

  /* ==== セクション切替 ==== */
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ==== レスポンシブ ==== */
  @media (max-width: 600px) {
    .container { padding: 8px 14px 40px; }
    .section-head h2 { font-size: 18px; }
    .order-cta { padding: 32px 20px; }
    .btn-primary, .btn-secondary { width: 100%; min-width: 0; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- オデカケ倶楽部 -->
  <section class="section" id="section-club">
    <div class="section-head">
      <h2>オデカケ倶楽部</h2>
      <p class="lead">毎月企画のパッケージツアー。少人数制でゆっくりと。気になる月をお選びください。</p>
    </div>
    <div class="month-nav" id="month-nav"></div>
    <div class="cards" id="cards-club"><div class="loading">読み込み中…</div></div>
  </section>

  <!-- オーダーメイド -->
  <section class="section" id="section-order">
    <div class="section-head">
      <h2>オーダーメイド</h2>
      <p class="lead">「行きたい場所」と「願い」をお聞かせください。理学療法士・看護師・ケアマネがチームで現地調査を含めた専用プランをご提案します。</p>
    </div>
    <div class="order-cta">
      <h3>オーダーメイドのご相談</h3>
      <p>専用申込フォームは現在準備中です。<br>お気軽にお問い合わせ・LINEからご相談ください。</p>
      <div class="cta-buttons">
        <a href="https://o-dekake.com/contact/" target="_top" class="btn-primary">お問い合わせ</a>
        <a href="https://lin.ee/z2rLO3i" target="_top" class="btn-secondary">LINEで相談</a>
      </div>
    </div>
  </section>

  <!-- 集まったら開催 -->
  <section class="section" id="section-gathered">
    <div class="section-head">
      <h2>集まったら開催</h2>
      <p class="lead">行きたい人が一定数集まったら開催する企画です。気になるものがあればお早めに。</p>
    </div>
    <div class="cards" id="cards-gathered"><div class="loading">読み込み中…</div></div>
  </section>

</div>

<script>
/* ============================================================
   オデカケ予約ページ（iframe埋込・サブセクション単一表示版）
   - URLクエリ ?type=club|order|gathered で表示セクションを決定
   - パラメータなしの場合は club を表示（親メニュー直クリック時のフォールバック）
   ============================================================ */

const APPLY_FORM_URL = ""; // 後で申込フォーム（Googleフォーム等）のURLを入れる

const $ = (sel, el = document) => el.querySelector(sel);
const $$ = (sel, el = document) => Array.from(el.querySelectorAll(sel));

function formatDate(iso) {
  const d = new Date(iso);
  return {
    monthEn: d.toLocaleString("en-US", { month: "short" }).toUpperCase(),
    day: d.getDate(),
    full: `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${"日月火水木金土"[d.getDay()]}）`,
    yearMonth: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`
  };
}

function applyButtonHTML(eventId) {
  if (!APPLY_FORM_URL) {
    return `<a class="btn-apply" href="https://o-dekake.com/contact/" target="_top">お問い合わせから申込</a>`;
  }
  return `<a class="btn-apply" href="${APPLY_FORM_URL}${encodeURIComponent(eventId)}" target="_top">申し込む</a>`;
}

function renderClubMonth(events, yearMonth) {
  const list = events.filter(e => e.type === "club" && formatDate(e.date).yearMonth === yearMonth);
  const wrap = $("#cards-club");

  if (list.length === 0) {
    wrap.innerHTML = '<div class="empty">この月の予定はまだ準備中です。</div>';
    return;
  }

  wrap.innerHTML = list.map(ev => {
    const d = formatDate(ev.date);
    return `
      <article class="card">
        <div class="card-image" style="background-image:url('${ev.image}')">
          <div class="card-date">
            <div class="month">${d.monthEn}</div>
            <div class="day">${d.day}</div>
          </div>
          <div class="card-tag">CLUB</div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${ev.title}</h3>
          <div class="card-meta">
            <div class="card-meta-row"><span class="card-meta-label">日　程</span><span>${d.full}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">行き先</span><span>${ev.location}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">参加費</span><span>${ev.fee}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">定　員</span><span>${ev.capacity}名</span></div>
            <div class="card-meta-row"><span class="card-meta-label">締　切</span><span>${formatDate(ev.deadline).full}</span></div>
          </div>
          <p class="card-desc">${ev.description}</p>
          ${applyButtonHTML(ev.id)}
        </div>
      </article>
    `;
  }).join("");
}

function buildMonthNav(events) {
  const clubEvents = events.filter(e => e.type === "club");
  const months = [...new Set(clubEvents.map(e => formatDate(e.date).yearMonth))].sort();
  const nav = $("#month-nav");
  nav.innerHTML = "";

  months.forEach((ym, i) => {
    const [y, m] = ym.split("-");
    const btn = document.createElement("button");
    btn.className = "month-pill" + (i === 0 ? " active" : "");
    btn.textContent = `${y}年${parseInt(m, 10)}月分`;
    btn.dataset.month = ym;
    btn.addEventListener("click", () => {
      $$(".month-pill").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      renderClubMonth(events, ym);
    });
    nav.appendChild(btn);
  });

  if (months.length > 0) {
    renderClubMonth(events, months[0]);
  } else {
    $("#cards-club").innerHTML = '<div class="empty">予定は順次追加していきます。</div>';
  }
}

function renderGathered(events) {
  const list = events.filter(e => e.type === "gathered");
  const wrap = $("#cards-gathered");

  if (list.length === 0) {
    wrap.innerHTML = '<div class="empty">現在募集中の企画はありません。</div>';
    return;
  }

  wrap.innerHTML = list.map(ev => {
    const d = formatDate(ev.date);
    const pct = Math.min(100, Math.round((ev.current / ev.capacity) * 100));
    const met = ev.current >= ev.capacity;
    return `
      <article class="card">
        <div class="card-image" style="background-image:url('${ev.image}')">
          <div class="card-date">
            <div class="month">${d.monthEn}</div>
            <div class="day">${d.day}</div>
          </div>
          <div class="card-tag gathered">GATHERING</div>
        </div>
        <div class="card-body">
          <h3 class="card-title">${ev.title}</h3>
          <div class="card-meta">
            <div class="card-meta-row"><span class="card-meta-label">予定日</span><span>${d.full}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">行き先</span><span>${ev.location}</span></div>
            <div class="card-meta-row"><span class="card-meta-label">参加費</span><span>${ev.fee}</span></div>
          </div>
          <div class="progress">
            <div class="progress-stat">
              <span>集まり状況</span>
              <span><strong>${ev.current}</strong> / ${ev.capacity}名</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-state ${met ? "met" : ""}">${met ? "★ 開催確定 — 残席わずか" : `あと ${ev.capacity - ev.current} 名で開催確定`}</div>
          </div>
          <p class="card-desc">${ev.description}</p>
          ${applyButtonHTML(ev.id)}
        </div>
      </article>
    `;
  }).join("");
}

/* ===== セクション切替（URLクエリで決定） ===== */
function activateSection(target) {
  const valid = ["club", "order", "gathered"];
  const t = valid.includes(target) ? target : "club";
  $$(".section").forEach(s => s.classList.toggle("active", s.id === `section-${t}`));
}

const params = new URLSearchParams(window.location.search);
activateSection(params.get("type"));

/* ===== データ読み込み ===== */
fetch("./data/events.json", { cache: "no-cache" })
  .then(r => {
    if (!r.ok) throw new Error("events.json not found");
    return r.json();
  })
  .then(data => {
    const events = data.events || [];
    buildMonthNav(events);
    renderGathered(events);
  })
  .catch(err => {
    console.error(err);
    $("#cards-club").innerHTML = '<div class="empty">予定の読み込みに失敗しました。</div>';
    $("#cards-gathered").innerHTML = '<div class="empty">予定の読み込みに失敗しました。</div>';
  });
</script>

</body>
</html>
